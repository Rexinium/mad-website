<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#3a0f0a"/>
      <stop offset="55%" stop-color="#180706"/>
      <stop offset="100%" stop-color="#0a0303"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3b1a"/>
      <stop offset="100%" stop-color="#ff6844"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- İnce grid dokusu -->
  <g stroke="rgba(255,58,26,0.06)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Sol üst köşe süsü -->
  <g stroke="url(#accent)" stroke-width="4" fill="none" opacity="0.55">
    <path d="M 60 60 L 60 130 M 60 60 L 130 60"/>
  </g>
  <!-- Sağ alt köşe süsü -->
  <g stroke="url(#accent)" stroke-width="4" fill="none" opacity="0.55">
    <path d="M 1140 570 L 1140 500 M 1140 570 L 1070 570"/>
  </g>

  <!-- Ana MAD logosu (kırmızı çerçeve + beyaz yazı) -->
  <g transform="translate(600 315)" filter="url(#glow)">
    <rect x="-230" y="-115" width="460" height="230" rx="24" fill="none" stroke="url(#accent)" stroke-width="8"/>
    <text x="0" y="34" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="180" font-weight="900" fill="#ffffff" letter-spacing="14">MAD</text>
  </g>

  <!-- Alt yazı -->
  <text x="600" y="500" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#f0d8c8" letter-spacing="8" opacity="0.95">CS2 OYUNCU TOPLULUĞU</text>

  <!-- Sunucu isimleri -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="3" fill="#ffb7a0" opacity="0.85">
    <text x="600" y="560" text-anchor="middle">AWP LEGO · AIM PISTOL · AIM REDLINE</text>
  </g>

  <!-- Domain -->
  <text x="600" y="605" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="500" fill="#8a5040" letter-spacing="4">madcs2.com</text>
</svg>
